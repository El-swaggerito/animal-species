<!-- 
  File: map-view.html
  Purpose: General map overview page.
  Functionality: Displays a large, interactive overview map of Scotland.
  - Clicking the map redirects to the detailed regional map view (map-detail.html).
  - Provides navigation back to the Home Page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Of Sightings - Scottish Mammal Observations</title>
    <!-- Main project CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="map-view-page">
    <!-- Overlay for potential background styling -->
    <div class="overlay"></div>
    <main class="map-view-container">
        <!-- Page Header with Home Page navigation -->
        <header class="map-view-header">
            <a href="index.html" class="home-link-top">
                <div class="back-arrow">
                    <img src="images/homepage arrow.png" alt="Home">
                </div>
                <!-- Label visibility managed by CSS media queries -->
                <span>Home Page</span>
            </a>
            <h1>Map Of Sightings</h1>
        </header>

        <!-- Primary Map Display: Interactive area leading to regional details -->
        <section class="large-map-display">
            <a href="map-detail.html">
                <img src="images/map view.png" alt="Scotland Map View">
            </a>
        </section>

    </main>
</body>
</html>
