<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sightings - Scottish Mammal Observations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="sightings-page">
    <div class="overlay"></div>
    <main class="sightings-container">
        <h1>Sightings</h1>

        <section class="sighting-grid">
            <div class="sighting-card">
                <span class="animal-name-top">Red deer</span>
                <div class="sighting-image-container">
                    <img src="images/highlands.png" alt="Highlands landscape">
                </div>
                <span class="location-name-bottom">Highlands</span>
            </div>

            <div class="sighting-card">
                <span class="animal-name-top">Red Squirrel</span>
                <div class="sighting-image-container">
                    <img src="images/cairngorms.png" alt="Cairngorms landscape">
                </div>
                <span class="location-name-bottom">Cairngorms</span>
            </div>

            <div class="sighting-card">
                <span class="animal-name-top">European Otter</span>
                <div class="sighting-image-container">
                    <img src="images/river spey.png" alt="River Spey landscape">
                </div>
                <span class="location-name-bottom">River Spey</span>
            </div>

            <div class="sighting-card">
                <span class="animal-name-top">Highland Cow</span>
                <div class="sighting-image-container">
                    <img src="images/isle of skye.png" alt="Isle Of Skye landscape">
                </div>
                <span class="location-name-bottom">Isle Of Skye</span>
            </div>
        </section>

        <nav class="page-nav-controls">
            <a href="index.html" class="page-nav-btn">
                <img src="images/page prev.png" alt="Previous page">
            </a>
            <a href="#" class="page-nav-btn">
                <img src="images/page next.png" alt="Next page">
            </a>
        </nav>
    </main>
</body>
</html>
