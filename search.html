<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Mammals Sightings - Scottish Mammal Observations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="search-page">
    <div class="overlay"></div>
    <main class="search-container">
        <h1>New mammals sightings</h1>

        <form class="search-form">
            <div class="form-group">
                <label for="email">Email Address :</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="mammal-name">Name Of Mammal :</label>
                <input type="text" id="mammal-name" name="mammal-name">
            </div>

            <div class="form-group">
                <label for="location">Mammal's Location :</label>
                <input type="text" id="location" name="location">
            </div>

            <div class="form-group">
                <label for="note">Note :</label>
                <textarea id="note" name="note"></textarea>
            </div>
        </form>

        <nav class="page-nav-controls">
            <a href="index.html" class="page-nav-btn">
                <img src="images/page prev.png" alt="Previous page">
            </a>
            <a href="#" class="page-nav-btn">
                <img src="images/page next.png" alt="Next page">
            </a>
        </nav>
    </main>
</body>
</html>
